services:
  # ── Belabox SRTLA Receiver (datagutt/belabox-receiver) ─────────────────────
  # Updates: docker compose pull && docker compose up -d
  bbox-receiver:
    image: datagutt/belabox-receiver:latest
    ports:
      - "5000:5000/udp"     # SRTLA input ← Belabox app
      - "8181:8181/tcp"     # SLS management API (UIRist SRT section)
      - "8282:8282/udp"     # SRT output → OBS/VLC
    volumes:
      - ./bbox-config.json:/app/config.json:ro
    restart: unless-stopped

  # ── RIST API (UIRist + librist/ristreceiver) ────────────────────────────────
  rist-api:
    build:
      context: ./api
      dockerfile: ../docker/rist-api.Dockerfile
    ports:
      - "${RIST_API_PORT:-3001}:3001"
    environment:
      RIST_API_PORT: "3001"
      RIST_API_KEY: "${RIST_API_KEY:-}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      RIST_STATE_FILE: "/app/data/receivers.json"
      NODE_ENV: "production"
    volumes:
      - rist-data:/app/data
      - rist-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── UIRist UI (nginx + React build) ────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: docker/production.Dockerfile
      args:
        REACT_APP_BASE_URL: "${APP_URL:-http://localhost:8181}"
        REACT_APP_SRT_PLAYER_PORT: "${SRT_PLAYER_PORT:-8282}"
        REACT_APP_SRT_SENDER_PORT: "${SRT_SENDER_PORT:-5000}"
        REACT_APP_SLS_STATS_PORT: "${SLS_STATS_PORT:-8181}"
        REACT_APP_SRTLA_PORT: "${SRTLA_PORT:-5000}"
        REACT_APP_RIST_API_URL: "${RIST_API_URL:-http://localhost:3001}"
    ports:
      - "${UI_PORT:-80}:80"
    restart: unless-stopped
    depends_on:
      rist-api:
        condition: service_healthy

  # ── Dev UI (only with: docker compose --profile dev up) ───────────────────
  ui-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: docker/development.Dockerfile
    volumes:
      - ./html:/app
    environment:
      REACT_APP_BASE_URL: "${APP_URL:-http://localhost:8181}"
      REACT_APP_SRT_PLAYER_PORT: "${SRT_PLAYER_PORT:-8282}"
      REACT_APP_SRT_SENDER_PORT: "${SRT_SENDER_PORT:-5000}"
      REACT_APP_SLS_STATS_PORT: "${SLS_STATS_PORT:-8181}"
      REACT_APP_SRTLA_PORT: "${SRTLA_PORT:-5000}"
      REACT_APP_RIST_API_URL: "${RIST_API_URL:-http://localhost:3001}"
    ports:
      - "3000:3000"

volumes:
  rist-data:
  rist-logs:
